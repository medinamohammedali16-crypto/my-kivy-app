name: Build APK  
on: [push, workflow_dispatch]  
  
jobs:  
  build:  
    runs-on: ubuntu-22.04 # ወደ 22.04 መመለስ የተሻለ ነው ለተኳኋኝነት  
    steps:  
      - uses: actions/checkout@v4  
  
      - name: Install dependencies  
        run: |  
          sudo apt update  
          # እዚህ ጋር libtinfo5ን አውጥተነዋል  
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev  
          pip install --user --upgrade Cython==0.29.33 buildozer  
  
      - name: Build with Buildozer  
        run: |  
          yes | buildozer -v android debug  
  
      - name: Upload APK  
        uses: actions/upload-artifact@v4  
        with:  
          name: my-app-apk  
          path: bin/*.apk
