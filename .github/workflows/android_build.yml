name: Build APK  
on: [push, workflow_dispatch]  
  
jobs:  
  build:  
    runs-on: ubuntu-latest  
    steps:  
      - uses: actions/checkout@v3  
  
      - name: Install dependencies  
        run: |  
          sudo apt update  
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev  
          pip install --user --upgrade Cython==0.29.33 buildozer  
  
      - name: Build with Buildozer  
        run: |  
          yes | ~/.local/bin/buildozer android debug  
  
      - name: Upload APK  
        uses: actions/upload-artifact@v3  
        with:  
          name: my-app-apk  
          path: bin/*.apk
